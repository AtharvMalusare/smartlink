version: "3.8"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: smartlink
      POSTGRES_PASSWORD: smartlink123
      POSTGRES_DB: smartlink
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data: